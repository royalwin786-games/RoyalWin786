<!doctype html>
<html lang="en">
  <body style="margin:0;padding:28px;background:#f2f5f9;font-family:Arial,sans-serif;color:#07162f">
    <div style="max-width:520px;margin:0 auto;padding:32px;border-radius:22px;background:#ffffff;border:1px solid #e1e7ef">
      <p style="margin:0 0 8px;color:#b88924;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">RoyalWin786</p>
      <h1 style="margin:0 0 12px;font-size:26px">Reset your player password</h1>
      <p style="margin:0 0 22px;color:#667085;line-height:1.55">We received a request to reset the password for {{ .Email }}. Use the secure button below to choose a new password.</p>
      <p style="margin:0">
        <a href="{{ .ConfirmationURL }}" style="display:block;padding:15px 20px;border-radius:14px;background:#07162f;color:#ffffff;text-align:center;text-decoration:none;font-weight:700">Reset password</a>
      </p>
      <p style="margin:22px 0 0;color:#667085;font-size:13px;line-height:1.5">If you did not request this change, ignore this email and your password will remain unchanged.</p>
    </div>
  </body>
</html>
