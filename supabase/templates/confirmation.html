<!doctype html>
<html lang="en">
  <body style="margin:0;padding:28px;background:#f2f5f9;font-family:Arial,sans-serif;color:#07162f">
    <div style="max-width:520px;margin:0 auto;padding:32px;border-radius:22px;background:#ffffff;border:1px solid #e1e7ef">
      <p style="margin:0 0 8px;color:#b88924;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">RoyalWin786</p>
      <h1 style="margin:0 0 12px;font-size:26px">Verify your player account</h1>
      <p style="margin:0 0 22px;color:#667085;line-height:1.55">Hello {{ .Data.display_name }}, enter this one-time password on the RoyalWin786 registration screen:</p>
      <div style="padding:18px;border-radius:16px;background:#e9f8fd;color:#07162f;text-align:center;font-size:34px;font-weight:800;letter-spacing:10px">{{ .Token }}</div>
      <p style="margin:22px 0 0;color:#667085;font-size:13px;line-height:1.5">Do not share this OTP with anyone. If you did not create this account, you can ignore this email.</p>
    </div>
  </body>
</html>
