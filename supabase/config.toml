project_id = "royalwin786"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://royalwin786-games.github.io/RoyalWin786/"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
otp_length = 6
otp_expiry = 600

[auth.email.template.confirmation]
subject = "{{ .Token }} is your RoyalWin786 verification code"
content_path = "./supabase/templates/confirmation.html"

[auth.sms]
enable_signup = false
enable_confirmations = false

[functions.identifier-login]
verify_jwt = false
